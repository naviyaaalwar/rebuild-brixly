<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Message Sent Successfully" />
        <meta name="author" content="Rebuild" />
        <title>Message Sent | Rebuild</title>
        <link rel="icon" type="image/x-icon" href="assets/img/cool.png" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            /* Continuous Deep Eucalyptus Canvas */
            html, body {
                background-color: #1d3535 !important;
                color: #ffffff !important;
                font-family: 'Quicksand', sans-serif !important;
                overflow-x: hidden;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            .navbar-brand {
                font-family: 'Comfortaa', sans-serif !important;
                font-weight: 700;
                color: #bfd3c1 !important;
            }

            .nav-link {
                font-weight: 700;
                font-size: 0.95rem;
                color: #bfd3c1 !important;
                opacity: 1 !important;
                transition: opacity 0.2s ease;
            }
            .nav-link:hover {
                opacity: 0.7 !important;
            }
            
            /* Success Panel Message Box */
            .success-box {
                background-color: #2d4a4a !important;
                border: 2px solid #0a1414;
                border-radius: 32px;
                padding: 4rem 3rem;
                box-shadow: 0 1rem 3rem rgba(10, 20, 20, 0.25);
                max-width: 600px;
                width: 100%;
            }

            .btn-return {
                background-color: #bfd3c1 !important;
                color: #0a1414 !important;
                font-weight: 700;
                border-radius: 12px !important;
                padding: 0.75rem 2rem !important;
                border: none !important;
                text-decoration: none !important;
                display: inline-block;
                transition: opacity 0.2s ease, transform 0.1s ease !important;
            }
            .btn-return:hover {
                opacity: 0.9 !important;
                color: #0a1414 !important;
            }
            .btn-return:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>

        <nav class="navbar navbar-expand-lg py-4" style="background-color: #0a1414; border-bottom: 1px solid rgba(191, 211, 193, 0.08);">
            <div class="container">
                <div class="d-flex align-items-center">
                    <img src="assets/img/logo.png" alt="Logo" width="30" style="height: auto;" class="me-2" />
                    <a class="navbar-brand m-0" href="index.html">Rebuild | Brixly</a>
                </div>
                <div class="navbar-nav ms-auto flex-row align-items-center" style="gap: 2.5rem;">
                    <a class="nav-link" href="product.html">Brixly</a>
                    <a class="nav-link" href="about.html">Our Team</a>
                    <a class="nav-link" href="contact.html">Contact Us</a>
                </div>
            </div>
        </nav>

        <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 my-4">
            <div class="container d-flex justify-content-center">
                <div class="success-box text-center">
                    <div style="width: 72px; height: 72px; background-color: rgba(191, 211, 193, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;" class="mx-auto mb-4">
                        <i class="bi bi-check-circle-fill" style="color: #bfd3c1; font-size: 2.5rem;"></i>
                    </div>
                    <span style="font-weight: 700; font-size: 0.85rem; color: #bfd3c1 !important; text-transform: uppercase; letter-spacing: 2px; display: block;" class="mb-2">
                        Submission Received
                    </span>
                    <h1 class="fw-bold mb-3 text-white" style="font-family: 'Comfortaa', sans-serif !important; letter-spacing: -1px;">Thank You!</h1>
                    <p class="mb-5" style="color: #bfd3c1; opacity: 0.95; font-size: 1.05rem; line-height: 1.7;">
                        Your message has been securely sent to the Rebuild team. We appreciate you reaching out about Brixly and will get back to you as soon as possible.
                    </p>
                    <a href="index.html" class="btn-return">Return Home</a>
                </div>
            </div>
        </main>

        <footer class="py-5" style="background-color: #0a1414; border-top: 1px solid rgba(191, 211, 193, 0.08); margin-top: auto;">
            <div class="container text-center">
                <p class="m-0" style="color: #bfd3c1; opacity: 0.5; font-size: 0.8rem;">
                    &copy; 2026 Rebuild. All Rights Reserved.
                </p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
